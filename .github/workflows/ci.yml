name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code into the runner environment
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up the Python interpreter environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Upgrade pip and install required testing utilities
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest flake8

    # Step 4: Run code style and syntax checks using flake8 linting
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub Editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # Step 5: Automatically discover and run unit tests using pytest
    - name: Run unit tests with pytest
      run: |
        pytest
